<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"  th:fragment="main-fragment(titre,maincontent)">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
<title th:replace=${titre}>Insert title here</title>
</head>
<body class="d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top mb-2">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Formation Spring</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/hello}">Hello world</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/exemple}">Exemple</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/exemple/thymeleaf}">Thymeleaf</a>
        </li>
         <li class="nav-item">
          <a class="nav-link" th:href="@{/articles}">Articles</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<main>
    <div th:replace="${maincontent}?:~{}"></div>
</main>
<footer class="mt-auto">
    <hr/>
    <p class="text-center small"> Formation Spring - Dawan - Février 2026</p>
</footer>
<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
