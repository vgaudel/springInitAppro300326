<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{main-layout::main-fragment(~{::title},~{::#articles-main-content})}">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
	th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
<title>Exemple Boucle Thymeleaf</title>
</head>
<body>
	<div class="container-fluid" id="articles-main-content">
		<form th:action="@{/logout}" method="post">
			<button type="submit" class="btn btn-danger">Déconnexion</button>
		</form>
		<h1 class="text-center my-4">Gestion des articles</h1>
		<div th:if="${! #strings.isEmpty(errorMessage)}"
			th:text=${errorMessage} class="alert alert-primary"></div>
		<table class="table" th:if="${not #lists.isEmpty(articles)}">
			<thead>
				<tr>
					<th>Nom</th>
					<th>Prix</th>
					<th>Description</th>
					<th>Date de production</th>
					<th>Emballage</th>
					<th>Action</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="a : ${articles}">
					<td th:text="${a.nom}"></td>
					<td th:text="|${a.prix} €|"></td>
					<td th:text="${a.description}"></td>
					<td th:text="${#temporals.format(a.dateProduction,'dd/MM/yyyy')}"></td>
					<td
						th:text="${#strings.capitalize(#strings.toLowerCase(a.emballage))}"></td>
					<td><a class="btn btn-danger btn-sm mx-2"
						th:href="@{/articles/remove/{id}(id=${a.id})}">Supprimer</a> <a
						th:href="@{/}" class="btn btn-success btn-sm mx-2">Modifier</a></td>

				</tr>
			</tbody>
		</table>

		<div th:insert="~{footer :: copy (1.1.0)}"></div>
	</div>
	<script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
